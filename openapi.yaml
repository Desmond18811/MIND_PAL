openapi: 3.0.0
info:
  title: MindPal API
  description: Complete documentation of all API endpoints for the MindPal Mental Health Application.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
        name:
          type: string
    Error:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Error description

security:
  - bearerAuth: []

paths:
  # Authentication
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: securePassword123
                username:
                  type: string
                  example: John Doe
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"

  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: securePassword123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Password reset email sent

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password with token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                otp:
                  type: string
                newPassword:
                  type: string
      responses:
        "200":
          description: Password reset successful

  /auth/verify-2fa:
    post:
      tags: [Authentication]
      summary: Verify 2FA code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                token:
                  type: string
      responses:
        "200":
          description: 2FA verification successful

  # Profile
  /profile:
    post:
      tags: [Profile]
      summary: Create profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                personalInfo:
                  type: object
                  properties:
                    firstName:
                      type: string
                      example: John
                    lastName:
                      type: string
                      example: Doe
                    dateOfBirth:
                      type: string
                      format: date
                      example: "1995-06-15"
                    gender:
                      type: string
                      enum: [male, female, other, prefer-not-to-say]
                      example: male
                    profilePicture:
                      type: string
                      example: "https://example.com/photo.jpg"
                contactInfo:
                  type: object
                  properties:
                    email:
                      type: string
                      example: john@example.com
                    phone:
                      type: string
                      example: "+1234567890"
                    address:
                      type: object
                      properties:
                        street:
                          type: string
                          example: "123 Main St"
                        city:
                          type: string
                          example: "New York"
                        state:
                          type: string
                          example: "NY"
                        country:
                          type: string
                          example: "US"
                        zipCode:
                          type: string
                          example: "10001"
                preferences:
                  type: object
                  properties:
                    theme:
                      type: string
                      enum: [light, dark, system]
                      example: system
                    language:
                      type: string
                      example: en
                    notificationPreferences:
                      type: object
                      properties:
                        email:
                          type: boolean
                          example: true
                        push:
                          type: boolean
                          example: true
                        sms:
                          type: boolean
                          example: false
                healthInfo:
                  type: object
                  properties:
                    height:
                      type: number
                      description: Height in cm
                      example: 175
                    weight:
                      type: number
                      description: Weight in kg
                      example: 70
                    bloodType:
                      type: string
                      enum: ["A+", "A-", "B+", "B-", "AB+", "AB-", "O+", "O-"]
                      example: "O+"
                    allergies:
                      type: array
                      items:
                        type: string
                      example: ["peanuts"]
                    medications:
                      type: array
                      items:
                        type: string
                      example: []
                    conditions:
                      type: array
                      items:
                        type: string
                      example: []
      responses:
        "201":
          description: Profile created

    get:
      tags: [Profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile details

    put:
      tags: [Profile]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Same structure as create profile - all fields are optional for update
              properties:
                personalInfo:
                  type: object
                  properties:
                    firstName:
                      type: string
                      example: Jane
                    lastName:
                      type: string
                      example: Doe
                preferences:
                  type: object
                  properties:
                    theme:
                      type: string
                      enum: [light, dark, system]
                      example: dark
      responses:
        "200":
          description: Profile updated

    delete:
      tags: [Profile]
      summary: Delete profile
      responses:
        "200":
          description: Profile deleted

  /profile/options:
    get:
      tags: [Profile]
      summary: Get profile field options
      responses:
        "200":
          description: Profile options

  # Serenity AI Chat
  /serenity/chat:
    post:
      tags: [Serenity AI Chat]
      summary: Send message to Serenity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: How can I improve my sleep quality?
                sessionId:
                  type: string
                  description: Optional. Pass a valid session ID to continue an existing conversation. Leave empty to start a new session.
                  example: ""
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      sessionId:
                        type: string
                      message:
                        type: string
                      sentiment:
                        type: object
                      timestamp:
                        type: string
                        format: date-time

  /serenity/sessions:
    get:
      tags: [Serenity AI Chat]
      summary: Get all chat sessions
      responses:
        "200":
          description: List of sessions

  /serenity/session/{id}:
    get:
      tags: [Serenity AI Chat]
      summary: Get specific session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            description: A valid MongoDB ObjectId for the session
            example: 60d0fe4f5311236168a109ca
      responses:
        "200":
          description: Session details

  /serenity/session:
    post:
      tags: [Serenity AI Chat]
      summary: Create new session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [text, voice]
                  example: text
      responses:
        "201":
          description: Session created

  /serenity/insights:
    get:
      tags: [Serenity AI Chat]
      summary: Get AI-generated insights
      responses:
        "200":
          description: Insights data

  /serenity/suggestions:
    get:
      tags: [Serenity AI Chat]
      summary: Get activity suggestions
      parameters:
        - in: query
          name: mood
          schema:
            type: integer
            minimum: 1
            maximum: 10
            example: 5
        - in: query
          name: timeOfDay
          schema:
            type: string
            enum: [morning, afternoon, evening, night]
            example: afternoon
      responses:
        "200":
          description: Suggestions list

  /serenity/permissions:
    get:
      tags: [Serenity AI Chat]
      summary: Get data permissions
      responses:
        "200":
          description: User permissions

    post:
      tags: [Serenity AI Chat]
      summary: Update permissions
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                permissions:
                  type: object
                  properties:
                    analyzeMood:
                      type: boolean
                      example: true
                    analyzeSleepData:
                      type: boolean
                      example: true
                    analyzeJournals:
                      type: boolean
                      example: true
      responses:
        "200":
          description: Permissions updated

  /serenity/permissions/grant-all:
    post:
      tags: [Serenity AI Chat]
      summary: Grant all permissions
      responses:
        "200":
          description: All permissions granted

  /serenity/permissions/revoke-all:
    post:
      tags: [Serenity AI Chat]
      summary: Revoke all permissions
      responses:
        "200":
          description: All permissions revoked

  # Voice
  /voice/upload:
    post:
      tags: [Voice]
      summary: Upload voice note for transcription
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                  description: Audio file (wav, webm, mp3, ogg, m4a)
                sessionId:
                  type: string
                  description: Optional. Valid MongoDB ObjectId of an existing chat session.
                  example: ""
                language:
                  type: string
                  description: Language code for transcription
                  example: en-US
                generateAudio:
                  type: string
                  description: Set to "true" to generate TTS audio response
                  enum: ["true", "false"]
                  example: "false"
      responses:
        "200":
          description: Transcription successful

  /voice/transcribe:
    post:
      tags: [Voice]
      summary: Transcribe audio only
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                  description: Audio file (wav, webm, mp3, ogg, m4a)
                language:
                  type: string
                  description: Language code for transcription
                  example: en-US
      responses:
        "200":
          description: Transcription result

  /voice/synthesize:
    post:
      tags: [Voice]
      summary: Convert text to speech
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  example: Hello, how are you feeling today?
                voice:
                  type: string
                  description: Voice ID (ElevenLabs or Google voice name)
                  example: en-US-Neural2-F
                speed:
                  type: number
                  description: Speaking rate (0.5 to 2.0)
                  example: 1.0
      responses:
        "200":
          description: Audio content

  /voice/analyze/{sessionId}:
    get:
      tags: [Voice]
      summary: Analyze voice patterns
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            description: A valid MongoDB ObjectId for the session
            example: 60d0fe4f5311236168a109ca
      responses:
        "200":
          description: Analysis result

  # Mood
  /mood:
    post:
      tags: [Mood]
      summary: Record mood entry
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                moodValue:
                  type: integer
                  minimum: 1
                  maximum: 10
                  description: "1-10 scale where 10 is best mood"
                  example: 7
                moodLabel:
                  type: string
                  enum:
                    [
                      depressed,
                      sad,
                      neutral,
                      content,
                      happy,
                      excited,
                      anxious,
                      angry,
                      stressed,
                    ]
                  example: content
                factors:
                  type: object
                  properties:
                    sleepQuality:
                      type: integer
                      minimum: 1
                      maximum: 5
                      example: 4
                    stressLevel:
                      type: integer
                      minimum: 1
                      maximum: 5
                      example: 2
                    energyLevel:
                      type: integer
                      minimum: 1
                      maximum: 5
                      example: 4
                    socialInteraction:
                      type: integer
                      minimum: 1
                      maximum: 5
                      example: 3
                activities:
                  type: array
                  items:
                    type: string
                    enum:
                      [
                        meditation,
                        exercise,
                        work,
                        social,
                        creative,
                        rest,
                        journaling,
                        music,
                        nature,
                      ]
                  example: ["exercise", "social"]
                notes:
                  type: string
                  maxLength: 500
                  example: Feeling good after a morning run
      responses:
        "201":
          description: Mood recorded

  /mood/history:
    get:
      tags: [Mood]
      summary: Get mood history
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Mood history

  # Journal
  /journal:
    post:
      tags: [Journal]
      summary: Create journal entry
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Morning Reflection
                content:
                  type: string
                  example: Today I woke up feeling refreshed and ready for the day.
                moodBefore:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 3
                moodAfter:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 4
                tags:
                  type: array
                  items:
                    type: string
                    enum:
                      [
                        reflection,
                        gratitude,
                        stress,
                        anxiety,
                        happiness,
                        goal,
                        dream,
                      ]
                  example: ["reflection", "gratitude"]
                musicPlayed:
                  type: object
                  properties:
                    trackId:
                      type: string
                    name:
                      type: string
                      example: Calm Waters
                    artist:
                      type: string
                      example: Relaxation Music
                    duration:
                      type: number
                    mood:
                      type: string
                images:
                  type: array
                  items:
                    type: string
                audio:
                  type: string
                  format: binary
      responses:
        "201":
          description: Journal created

  /journal/stats:
    get:
      tags: [Journal]
      summary: Get journal analytics
      responses:
        "200":
          description: Journal stats

  /journal/{id}:
    get:
      tags: [Journal]
      summary: Get specific entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Journal entry

  /journal/{id}/audio:
    get:
      tags: [Journal]
      summary: Stream journal audio
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audio stream

  # Sleep
  /sleep/sessions/start:
    post:
      tags: [Sleep]
      summary: Start sleep session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                environmentalFactors:
                  type: object
                  properties:
                    noiseLevel:
                      type: number
                      example: 2
                    roomTemperature:
                      type: number
                      example: 22
                    lightLevel:
                      type: number
                      example: 1
      responses:
        "200":
          description: Session started

  /sleep/sessions/end:
    post:
      tags: [Sleep]
      summary: End sleep session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                qualityScore:
                  type: integer
                  minimum: 1
                  maximum: 10
                  example: 7
                notes:
                  type: string
                  example: Slept well, woke up once
                deviceData:
                  type: object
                  description: Optional wearable data
                  properties:
                    movement:
                      type: array
                      items:
                        type: object
                        properties:
                          time:
                            type: string
                            format: date-time
                          intensity:
                            type: number
                    heartRate:
                      type: array
                      items:
                        type: object
                        properties:
                          time:
                            type: string
                            format: date-time
                          bpm:
                            type: number
      responses:
        "200":
          description: Session ended

  /sleep/stats:
    get:
      tags: [Sleep]
      summary: Get sleep statistics
      responses:
        "200":
          description: Sleep stats

  /sleep/schedule:
    put:
      tags: [Sleep]
      summary: Set sleep schedule
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetBedtime, targetWakeTime]
              properties:
                targetBedtime:
                  type: string
                  description: "HH:MM format"
                  example: "22:30"
                targetWakeTime:
                  type: string
                  description: "HH:MM format"
                  example: "06:30"
      responses:
        "200":
          description: Schedule updated
    get:
      tags: [Sleep]
      summary: Get sleep schedule
      responses:
        "200":
          description: Current schedule

  # Goals
  /goals:
    get:
      tags: [Goals]
      summary: Get all goals
      responses:
        "200":
          description: List of goals
    post:
      tags: [Goals]
      summary: Create goal
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Exercise daily for 30 minutes
                description:
                  type: string
                  example: Build a consistent exercise habit
                category:
                  type: string
                  enum:
                    [
                      mental-health,
                      productivity,
                      relationships,
                      fitness,
                      learning,
                      other,
                    ]
                  example: fitness
                difficulty:
                  type: string
                  enum: [easy, medium, hard]
                  example: medium
                targetDate:
                  type: string
                  format: date
                  example: "2026-06-01"
                milestones:
                  type: array
                  items:
                    type: object
                    properties:
                      description:
                        type: string
                  example:
                    - description: "Complete first week"
                    - description: "Complete first month"
      responses:
        "201":
          description: Goal created

  /goals/{id}:
    put:
      tags: [Goals]
      summary: Update goal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Goal updated
    delete:
      tags: [Goals]
      summary: Delete goal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Goal deleted

  /goals/{id}/milestones:
    post:
      tags: [Goals]
      summary: Add milestone
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Milestone added

  /goals/{id}/milestones/{milestoneId}/complete:
    patch:
      tags: [Goals]
      summary: Complete milestone
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: milestoneId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Milestone completed

  /goals/stats:
    get:
      tags: [Goals]
      summary: Get goal statistics
      responses:
        "200":
          description: Goal stats

  # Meditation
  /meditation/content:
    get:
      tags: [Meditation]
      summary: Get meditation content
      security: []
      responses:
        "200":
          description: Content list
    post:
      tags: [Meditation]
      summary: Create content (admin)
      responses:
        "201":
          description: Content created

  /meditation/sessions/start:
    post:
      tags: [Meditation]
      summary: Start meditation session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contentId:
                  type: string
                type:
                  type: string
                duration:
                  type: integer
      responses:
        "200":
          description: Session started

  /meditation/sessions/end:
    post:
      tags: [Meditation]
      summary: End meditation session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                completed:
                  type: boolean
                moodAfter:
                  type: integer
                notes:
                  type: string
      responses:
        "200":
          description: Session ended

  /meditation/progress:
    get:
      tags: [Meditation]
      summary: Get user progress
      responses:
        "200":
          description: Progress data

  /meditation/recommendations:
    get:
      tags: [Meditation]
      summary: Get recommendations
      responses:
        "200":
          description: Recommendations

  # Community
  /community/feed:
    get:
      tags: [Community]
      summary: Get community feed
      responses:
        "200":
          description: Feed items

  /community/posts:
    post:
      tags: [Community]
      summary: Create post
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                isAnonymous:
                  type: boolean
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Post created

  /community/posts/{id}/like:
    post:
      tags: [Community]
      summary: Like/unlike post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Like status updated

  /community/posts/{id}/comments:
    post:
      tags: [Community]
      summary: Add comment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Comment added
    get:
      tags: [Community]
      summary: Get comments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comments list

  # Therapists
  /therapists:
    get:
      tags: [Therapists]
      summary: Search/list therapists
      security: []
      parameters:
        - in: query
          name: specialization
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of therapists

  /therapists/{id}:
    get:
      tags: [Therapists]
      summary: Get therapist profile
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Therapist profile

    post:
      tags: [Therapists]
      summary: Rate therapist
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rating submitted

  /therapists/register:
    post:
      tags: [Therapists]
      summary: Register as therapist
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                licenseNumber:
                  type: string
                specializations:
                  type: array
                  items:
                    type: string
                bio:
                  type: string
                hourlyRate:
                  type: number
      responses:
        "201":
          description: Therapist registered

  /therapists/profile/me:
    get:
      tags: [Therapists]
      summary: Get own profile
      responses:
        "200":
